<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D‑Elephant Music</title>

<style>
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#0f172a;color:white}

header{display:flex;justify-content:space-between;align-items:center;padding:18px 30px;background:#020617;border-bottom:1px solid #1e293b}
header h1{margin:0;font-size:24px;color:#38bdf8}
nav a{margin-left:20px;text-decoration:none;color:#e2e8f0;font-size:14px}

.hero{height:60vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;background:linear-gradient(rgba(2,6,23,.7),rgba(2,6,23,.9)),url('https://images.unsplash.com/photo-1511379938547-c1f69419868d');background-size:cover;background-position:center}
.hero h2{font-size:46px;margin:0}
.hero p{color:#cbd5f5}

.container{max-width:1100px;margin:auto;padding:40px 20px}

.carousel{display:flex;overflow-x:auto;gap:20px}
.carousel::-webkit-scrollbar{display:none}

.card{min-width:240px;background:#020617;border-radius:12px;padding:15px;box-shadow:0 10px 25px rgba(0,0,0,.5)}
.card img{width:100%;height:180px;object-fit:cover;border-radius:10px}
.card h3{margin:10px 0 4px}
.card p{margin:0;font-size:13px;color:#94a3b8}

button{border:none;padding:7px 12px;border-radius:6px;background:#2563eb;color:white;margin-top:6px}

.upload{background:#020617;padding:25px;border-radius:12px}
.upload input{width:100%;padding:10px;margin-top:10px;border-radius:6px;border:none}

footer{text-align:center;padding:20px;background:#020617;margin-top:40px;color:#94a3b8}

#musicPlayer{position:fixed;bottom:0;left:0;width:100%;background:#020617;border-top:1px solid #1e293b;padding:10px 20px;display:flex;align-items:center;justify-content:space-between}

</style>
</head>

<body>

<header>
<h1>D‑Elephant</h1>
<nav>
<a href="#">Home</a>
<a href="#upload">Upload</a>
</nav>
</header>

<section class="hero">
<h2>D‑Elephant Music</h2>
<p>Upload and stream your music.</p>
</section>

<div class="container">
<h2>Trending Songs</h2>
<div id="songList" class="carousel"></div>
</div>

<div class="container" id="upload">
<h2>Upload Song</h2>
<div class="upload">

<input id="title" placeholder="Song title">

<label style="font-size:14px">Choose cover image</label>
<input id="cover" type="file" accept="image/*">

<label style="font-size:14px">Select song file</label>
<input id="file" type="file" accept="audio/*">

<button onclick="uploadSong()">Upload Song</button>

</div>
</div>

<footer>© 2026 D‑Elephant</footer>

<div id="musicPlayer">
<div id="nowPlaying">No song playing</div>
<audio id="player" controls style="width:60%"></audio>
</div>

<script>

let songs = JSON.parse(localStorage.getItem("delephantSongs")) || []

function saveSongs(){
localStorage.setItem("delephantSongs", JSON.stringify(songs))
}

function uploadSong(){

const title = document.getElementById("title").value
const fileInput = document.getElementById("file")
const coverInput = document.getElementById("cover")

if(!title) return alert("Enter song title")
if(!fileInput.files[0]) return alert("Select song file")

const songReader = new FileReader()

songReader.onload = function(e){

const songData = e.target.result

if(coverInput.files[0]){

const coverReader = new FileReader()

coverReader.onload = function(ev){
addSong(title, songData, ev.target.result)
}

coverReader.readAsDataURL(coverInput.files[0])

}else{
addSong(title, songData, "")
}

}

songReader.readAsDataURL(fileInput.files[0])

}

function addSong(title, file, cover){

songs.unshift({
 title:title,
 file:file,
 cover:cover,
 plays:0
})

saveSongs()
renderSongs()

}

function playSong(i){

songs[i].plays++

const player = document.getElementById("player")
player.src = songs[i].file
player.play()

const now = document.getElementById("nowPlaying")
now.innerText = "Now Playing: " + songs[i].title

saveSongs()
renderSongs()

}

function renderSongs(){

const list = document.getElementById("songList")
list.innerHTML = ""

songs.forEach((song,i)=>{

const shareLink = window.location.href + "#song-" + i

const card = `
<div class="card" id="song-${i}">
<img src="${song.cover || 'https://picsum.photos/300?random='+i}">
<h3>${song.title}</h3>
<p>▶ ${song.plays} plays</p>

<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px">
<button onclick="playSong(${i})">▶ Play</button>
<button onclick="likeSong(${i})">❤️ ${song.likes||0}</button>
<a href="${song.file}" download><button>⬇ Download</button></a>
<button onclick="shareSong('${shareLink}')">🔗 Share</button>
</div>

<div style="margin-top:8px">
<input placeholder="Write comment" onkeydown="addComment(event,${i})" style="width:100%;padding:6px;border-radius:6px;border:none">
<div style="font-size:12px;margin-top:5px">${(song.comments||[]).map(c=>`💬 ${c}`).join("<br>")}</div>
</div>

</div>`

list.innerHTML += card

})

}

function likeSong(i){

if(!songs[i].likes) songs[i].likes = 0
songs[i].likes++

saveSongs()
renderSongs()

}

function addComment(e,i){

if(e.key === "Enter"){

if(!songs[i].comments) songs[i].comments = []

songs[i].comments.push(e.target.value)

e.target.value = ""

saveSongs()
renderSongs()

}

}

function shareSong(link){

navigator.clipboard.writeText(link)
alert("Song link copied. You can paste it anywhere.")

}

renderSongs()

</script>

</body>
</html>
