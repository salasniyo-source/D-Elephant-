```html
<!DOCTYPE html>

<title>D-Elephant Music</title>

<style>
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#0f172a;color:white}

header{display:flex;justify-content:space-between;align-items:center;padding:18px 30px;background:#020617;position:sticky;top:0;z-index:10;border-bottom:1px solid #1e293b}

</style>
</head>

<body>

<header>
<h1>D-Elephant</h1>
<nav>
<a href="#">Home</a>
<a href="#upload">Upload</a>
<a href="#dashboard">My Songs</a>
</nav>
</header>

<section class="hero">

<h2 style="font-size:48px">D-Elephant Music</h2>

<p style="max-width:650px;font-size:18px;color:#cbd5f5">
Discover new sounds, upload your songs and build your fanbase on the next generation African music platform.
</p>

<button onclick="document.getElementById('upload').scrollIntoView({behavior:'smooth'})">Upload Music</button>

</section>

<div class="container">

<h2>Trending Songs</h2>

<div class="carousel" id="songList"></div>

</div>

<div class="container" id="upload">
<h2>Upload New Song</h2>
<div class="upload">
<input id="title" placeholder="Song title">
<input id="artist" placeholder="Artist name">
<input id="file" placeholder="MP3 file URL">
<button onclick="uploadSong()" style="margin-top:10px">Upload Song</button>
</div>
</div>

<div class="container" id="dashboard">
<h2>My Uploaded Songs</h2>
<div class="dashboard" id="mySongs"></div>
</div>

<footer>
© 2026 D-Elephant Music Platform
</footer>

<script>

let songs = JSON.parse(localStorage.getItem("delephantSongs")) || []

function saveSongs(){
localStorage.setItem("delephantSongs",JSON.stringify(songs))
}

function renderSongs(){

const list=document.getElementById("songList")
const my=document.getElementById("mySongs")

list.innerHTML=""
my.innerHTML=""

songs.forEach((song,i)=>{

const card=`
<div class="card">
<img src="https://picsum.photos/300?random=${i}">
<h3>${song.title}</h3>
<p>${song.artist}</p>
<audio controls src="${song.file}" style="width:100%"></audio>

<div class="actions">
<button onclick="react(${i})">🔥 ${song.reacts}</button>
<a href="${song.file}" download><button>⬇</button></a>
</div>

<div class="comments">
${song.comments.map(c=>`<div>💬 ${c}</div>`).join("")}
<input placeholder="Write comment" onkeydown="comment(event,${i})">
</div>
</div>
`

list.innerHTML+=card
my.innerHTML+=card

})

}

function uploadSong(){

const title=document.getElementById("title").value
const artist=document.getElementById("artist").value
const file=document.getElementById("file").value

if(!title || !file) return alert("Add song title and file")

songs.unshift({
 title,
 artist,
 file,
 reacts:0,
 comments:[]
})

saveSongs()
renderSongs()

}

function react(i){

songs[i].reacts++
saveSongs()
renderSongs()

}

function comment(e,i){

if(e.key==="Enter"){

songs[i].comments.push(e.target.value)
e.target.value=""
saveSongs()
renderSongs()

}

}

renderSongs()

</script>

</body>
</html>
